# .goreleaser.yml
version: 2

project_name: dayzctl

before:
  hooks:
    - go mod download
    - go mod tidy

builds:
  - id: dayzctl
    main: ./cmd/dayzctl
    binary: dayzctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/kabroxiko/dayzctl/internal/version.Version={{.Version}}
      - -X github.com/kabroxiko/dayzctl/internal/version.BuildTime={{.Date}}

# SBOM generation - minimal config without format
sboms:
  - id: manifest
    artifacts: binary

release:
  github:
    owner: kabroxiko
    name: dayzctl
  draft: false
  prerelease: auto
  mode: replace
  name_template: "{{.ProjectName}} {{.Version}}"

archives:
  - id: binary
    formats: [binary]
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^Merge'

dist: dist

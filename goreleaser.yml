# .goreleaser.yml
version: 2

project_name: dayzctl

before:
  hooks:
    - go mod download
    - go mod tidy

builds:
  - id: dayzctl
    main: ./cmd/dayzctl
    binary: dayzctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/kabroxiko/dayzctl/internal/version.Version={{.Version}}
      - -X github.com/kabroxiko/dayzctl/internal/version.BuildTime={{.Date}}

# Native: GoReleaser automatically creates a manifest with all artifacts
release:
  github:
    owner: kabroxiko
    name: dayzctl
  draft: false
  prerelease: auto
  mode: replace
  name_template: "{{.ProjectName}} {{.Version}}"
  # The manifest is auto-generated with all artifact names and checksums

archives:
  - id: binary
    formats: [binary]
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256
  # This generates a manifest-like file with all checksums

# Add a custom manifest file with version info
# This gets created during the build using Go template
sboms:
  - id: manifest
    artifacts: binary
    documents:
      - "manifest.json"
    # GoReleaser can generate SBOMs which are essentially manifests

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^Merge'

dist: dist

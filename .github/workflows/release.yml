name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify SBOM manifest
        run: |
          echo "=== SBOM Manifest ==="
          if [ -f dist/manifest.json ]; then
            echo "✅ SBOM manifest generated successfully"
            echo ""
            echo "Manifest contents:"
            cat dist/manifest.json | jq '.'
            echo ""
            echo "Version: $(cat dist/manifest.json | jq -r '.versionInfo')"
            echo "Packages: $(cat dist/manifest.json | jq -r '.packages | length')"
          else
            echo "❌ SBOM manifest not found"
            exit 1
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: dist/*
